spring:
  application:
    name: docquery
  output:
    ansi:
      enabled: always

  datasource:
    url: jdbc:postgresql://localhost:15432/docquery
    username: docquery
    password: docquery

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: true
      poll-interval: 1s
      quiet-period: 400ms
    livereload:
      enabled: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8081

logging:
  charset:
    console: UTF-8
  level:
    org.springframework.boot.devtools: DEBUG

# LangChain4j — 通义千问
langchain4j:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    model-name: qwen-plus
    chat-model:
      temperature: 0.3
      max-tokens: 2048
    embedding-model:
      model-name: text-embedding-v3

# 文件存储（本地）
docquery:
  storage:
    type: local
    local-path: ./uploads
